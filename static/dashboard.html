<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APIbase.pro — Provider Status Dashboard</title>
<meta name="description" content="Real-time status dashboard for all 37 APIbase.pro providers. Monitor health, API limits, call volume, and latency.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="canonical" href="https://apibase.pro/dashboard">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace;
  background:#1a1a2e;
  color:#b0ffb0;
  line-height:1.7;
  padding:1.5rem;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.window{
  max-width:960px;
  width:100%;
  background:#0c0c0c;
  border-radius:10px 10px 8px 8px;
  border:1px solid #444;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    0 0 80px rgba(0,255,65,0.04),
    inset 0 0 80px rgba(0,255,65,0.01);
  overflow:hidden;
  position:relative;
}

.window::after{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.06) 0px,
    rgba(0,0,0,0.06) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
  z-index:2;
}

.titlebar{
  background:linear-gradient(180deg,#3d3d3d 0%,#2a2a2a 100%);
  padding:10px 14px;
  display:flex;
  align-items:center;
  border-bottom:1px solid #1a1a1a;
  position:relative;
  z-index:3;
}

.dots{display:flex;gap:7px;flex-shrink:0}
.dot{
  width:13px;height:13px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,0.2);
}
.dot-red{background:#ff5f56;border-color:#e0443e}
.dot-yellow{background:#ffbd2e;border-color:#dea123}
.dot-green{background:#27c93f;border-color:#1aab29}

.titlebar-text{
  flex:1;
  text-align:center;
  color:#999;
  font-size:0.78rem;
  font-family:inherit;
  letter-spacing:0.5px;
}

.container{
  padding:1.8rem 2rem 2rem;
  position:relative;
  z-index:1;
}

nav{
  display:flex;
  flex-wrap:wrap;
  gap:0.3rem;
  margin-bottom:1.8rem;
  padding:0.5rem 0;
  border-bottom:1px solid #1a3a1a;
}
nav::before{content:'[';color:#555}
nav::after{content:']';color:#555}
nav .brand{
  color:#00ff41;
  font-weight:700;
  font-size:0.9rem;
  text-decoration:none;
  text-shadow:0 0 8px rgba(0,255,65,0.4);
}
nav a{
  color:#00cc33;
  text-decoration:none;
  font-size:0.85rem;
}
nav a::before{content:' | ';color:#333}
nav .brand::before{content:''}
nav a:hover{
  color:#00ff41;
  text-shadow:0 0 6px rgba(0,255,65,0.5);
}

h1{
  color:#00ff41;
  font-size:1.3rem;
  margin-bottom:1.5rem;
  line-height:1.5;
  text-shadow:0 0 10px rgba(0,255,65,0.3);
}
h1::before{content:'> ';color:#00aa30}

a{color:#00ccff;text-decoration:none}
a:hover{color:#66ddff;text-shadow:0 0 6px rgba(0,204,255,0.4)}

.totals{
  display:flex;
  gap:2rem;
  margin-bottom:1.5rem;
  padding:0.8rem 1rem;
  background:#080808;
  border:1px solid #1a3a1a;
  border-radius:4px;
  font-size:0.85rem;
}
.totals .stat{color:#a0d8a0}
.totals .val{color:#00ff41;font-weight:700}

.refresh-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:1rem;
  font-size:0.78rem;
  color:#2a6a2a;
}
.refresh-bar .timer{color:#00aa30}

.table-wrap{overflow-x:auto}
table{
  width:100%;
  border-collapse:collapse;
  font-size:0.82rem;
  background:#080808;
}
th,td{
  border:1px solid #1a3a1a;
  padding:0.5rem 0.7rem;
  text-align:left;
  white-space:nowrap;
}
th{
  color:#00ff41;
  background:#0a1a0a;
  text-shadow:0 0 4px rgba(0,255,65,0.2);
  position:sticky;
  top:0;
}
td{color:#88bb88}

.status-dot{
  display:inline-block;
  width:10px;height:10px;
  border-radius:50%;
  margin-right:6px;
  vertical-align:middle;
}
.dot-g{background:#27c93f;box-shadow:0 0 6px rgba(39,201,63,0.6)}
.dot-o{background:#ff9f43;box-shadow:0 0 6px rgba(255,159,67,0.6)}
.dot-y{background:#ffbd2e;box-shadow:0 0 6px rgba(255,189,46,0.6)}
.dot-r{background:#ff5f56;box-shadow:0 0 6px rgba(255,95,86,0.6)}
.dot-u{background:#555;box-shadow:0 0 4px rgba(85,85,85,0.4)}

.lat-green{color:#27c93f}
.lat-orange{color:#ff9f43}
.lat-red{color:#ff5f56}

.loading{
  text-align:center;
  padding:3rem;
  color:#2a6a2a;
  font-size:0.9rem;
}
.loading::after{
  content:'';
  display:inline-block;
  width:8px;height:1.1em;
  background:#00ff41;
  vertical-align:text-bottom;
  animation:blink 1s step-end infinite;
  margin-left:4px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.error-msg{
  text-align:center;
  padding:2rem;
  color:#ff5f56;
  font-size:0.85rem;
}

.footer{
  margin-top:2rem;
  padding:0.6rem 0;
  border-top:1px solid #1a3a1a;
  color:#2a6a2a;
  font-size:0.78rem;
  display:flex;
  justify-content:space-between;
}

@media(max-width:600px){
  body{padding:0.5rem}
  .container{padding:1rem}
  .titlebar{padding:8px 10px}
  h1{font-size:1.05rem}
  h1::before{content:''}
  table{font-size:0.72rem}
  th,td{padding:0.35rem}
  .col-latency{display:none}
  .totals{flex-wrap:wrap;gap:0.8rem}
  .footer{flex-direction:column;gap:0.3rem}
  nav::before,nav::after{display:none}
}
</style>
</head>
<body>
<div class="window">

<div class="titlebar">
<div class="dots">
<span class="dot dot-red"></span>
<span class="dot dot-yellow"></span>
<span class="dot dot-green"></span>
</div>
<span class="titlebar-text">apibase@prod ~ /srv/apibase/dashboard</span>
</div>

<div class="container">

<nav>
<a class="brand" href="/">APIbase.pro</a>
<a href="/dashboard">Dashboard</a>
<a href="/pricing">Pricing</a>
<a href="/contact">Contact</a>
<a href="/privacy">Privacy</a>
<a href="https://github.com/whiteknightonhorse/APIbase">GitHub</a>
</nav>

<h1>Provider Status Dashboard</h1>

<div class="totals" id="totals">
<span class="stat">Providers: <span class="val" id="t-providers">--</span></span>
<span class="stat">Tools: <span class="val" id="t-tools">--</span></span>
<span class="stat">Calls 24h: <span class="val" id="t-calls">--</span></span>
</div>

<div class="refresh-bar">
<span>Auto-refresh every 60s</span>
<span class="timer" id="timer">Next refresh: 60s</span>
</div>

<div id="dashboard-content">
<div class="loading">Loading dashboard data</div>
</div>

<div class="footer">
<span>STATUS: ONLINE</span>
<span id="gen-time">--</span>
</div>

</div>
</div>

<script>
(function(){
  var content = document.getElementById('dashboard-content');
  var timerEl = document.getElementById('timer');
  var countdown = 60;
  var intervalId = null;

  function statusDot(status) {
    var cls = 'dot-u';
    if (status === 'green') cls = 'dot-g';
    else if (status === 'orange') cls = 'dot-o';
    else if (status === 'yellow') cls = 'dot-y';
    else if (status === 'red') cls = 'dot-r';
    return '<span class="status-dot ' + cls + '"></span>';
  }

  function latencyClass(ms) {
    if (ms === null || ms === undefined) return '';
    if (ms < 500) return 'lat-green';
    if (ms <= 2000) return 'lat-orange';
    return 'lat-red';
  }

  function formatNum(n) {
    if (n === null || n === undefined) return '--';
    return n.toLocaleString();
  }

  function renderTable(data) {
    document.getElementById('t-providers').textContent = data.totals.providers;
    document.getElementById('t-tools').textContent = formatNum(data.totals.tools);
    document.getElementById('t-calls').textContent = formatNum(data.totals.calls_24h);
    document.getElementById('gen-time').textContent = 'Generated: ' + new Date(data.generated_at).toLocaleTimeString();

    var html = '<div class="table-wrap"><table>';
    html += '<thead><tr>';
    html += '<th>Provider</th>';
    html += '<th>Status</th>';
    html += '<th>Limits</th>';
    html += '<th>Calls 24h</th>';
    html += '<th class="col-latency">Avg Latency</th>';
    html += '<th>Tools</th>';
    html += '</tr></thead><tbody>';

    for (var i = 0; i < data.providers.length; i++) {
      var p = data.providers[i];
      html += '<tr>';
      html += '<td>' + escHtml(p.display_name) + '</td>';
      html += '<td>' + statusDot(p.health.status) + (p.health.latency_ms !== null ? p.health.latency_ms + 'ms' : '--') + '</td>';
      html += '<td>' + statusDot(p.limits.status);
      if (p.limits.type === 'unlimited') {
        html += 'Unlimited';
      } else {
        html += p.limits.pct_remaining + '%';
      }
      html += '</td>';
      html += '<td>' + formatNum(p.calls_24h) + '</td>';
      html += '<td class="col-latency ' + latencyClass(p.avg_latency_ms) + '">' + (p.avg_latency_ms !== null ? p.avg_latency_ms + 'ms' : '--') + '</td>';
      html += '<td>' + p.tool_count + '</td>';
      html += '</tr>';
    }

    html += '</tbody></table></div>';
    content.innerHTML = html;
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function fetchDashboard() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/v1/dashboard', true);
    xhr.timeout = 15000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          renderTable(data);
        } catch(e) {
          content.innerHTML = '<div class="error-msg">Failed to parse dashboard data</div>';
        }
      } else {
        content.innerHTML = '<div class="error-msg">Dashboard unavailable (HTTP ' + xhr.status + ')</div>';
      }
      countdown = 60;
    };
    xhr.onerror = function() {
      content.innerHTML = '<div class="error-msg">Network error — retrying in 60s</div>';
      countdown = 60;
    };
    xhr.ontimeout = function() {
      content.innerHTML = '<div class="error-msg">Request timeout — retrying in 60s</div>';
      countdown = 60;
    };
    xhr.send();
  }

  function tick() {
    countdown--;
    if (countdown <= 0) {
      fetchDashboard();
    }
    timerEl.textContent = 'Next refresh: ' + countdown + 's';
  }

  fetchDashboard();
  intervalId = setInterval(tick, 1000);
})();
</script>
</body>
</html>
