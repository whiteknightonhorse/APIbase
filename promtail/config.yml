# APIbase.pro — Promtail Configuration (§12.198)
# Collects Docker container logs via Docker SD, parses Pino JSON,
# extracts structured labels, pushes to Loki.
#
# Pipeline: container stdout → Docker json-file → Promtail → Loki → Grafana

server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
    pipeline_stages:
      - json:
          expressions:
            level: level
            request_id: request_id
            agent_id: agent_id
            stage: stage
      - labels:
          level:
          container:
