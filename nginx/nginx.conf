# APIbase.pro — Canonical Nginx Configuration (§12.239)
# NOTE: TLS terminated by host Nginx. This container serves HTTP only.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # --- Security (§12.239) ---
    server_tokens off;

    # --- Logging (JSON structured) ---
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_id":"$request_id",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';
    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    # --- Rate Limiting (§12.218) ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=30r/s;

    # --- Upstream ---
    upstream api_backend {
        server api:3000;
    }

    # --- Request ID (§12.108) ---
    map $http_x_request_id $req_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # --- Homepage content negotiation ---
    map $http_accept $homepage_type {
        default          html;
        ~application/json json;
    }

    # --- Stub Status for Exporter (§12.205, port 8080 internal) ---
    server {
        listen 8080;
        location /stub_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }

    # --- Main HTTP Server (TLS at host level) ---
    server {
        listen 80;
        server_name apibase.pro;

        # --- Timeouts (§12.179) ---
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;

        # --- Request Size (§12.34) ---
        client_max_body_size 1m;

        # --- Onboard (serves HTML, before API/MCP routes) ---
        location = /onboard {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
        }

        # --- API Routes ---
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
        }

        # --- MCP Routes (Streamable HTTP + SSE, no buffering) ---
        location /mcp {
            limit_req zone=mcp_limit burst=60 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        # --- SSE transport (deprecated, backward compat) ---
        location /sse {
            limit_req zone=mcp_limit burst=60 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        location /messages {
            limit_req zone=mcp_limit burst=60 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $req_id;
        }

        # --- Static Files (§12.51) ---
        location /.well-known/ {
            root /var/www/static;
            add_header Content-Type application/json;
        }

        location /robots.txt {
            root /var/www/static;
        }

        location /ai.txt {
            root /var/www/static;
        }

        location /llms.txt {
            root /var/www/static;
        }

        location = /icon.png {
            root /var/www/static;
            types { image/png png; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /logo.png {
            root /var/www/static;
            types { image/png png; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /favicon.svg {
            root /var/www/static;
            types { image/svg+xml svg; }
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /contact {
            root /var/www/static;
            try_files /contact.html =404;
        }

        location = /privacy {
            root /var/www/static;
            try_files /privacy.html =404;
        }

        location = /dashboard {
            root /var/www/static;
            try_files /dashboard.html =404;
        }

        # --- Homepage: content negotiation ---
        location = / {
            error_page 418 = @homepage_json;
            if ($homepage_type = json) {
                return 418;
            }
            root /var/www/static;
            try_files /index.html =404;
        }

        location @homepage_json {
            default_type application/json;
            return 200 '{"name":"APIbase.pro","description":"The API Hub for AI Agents","version":"1.0.0","docs":"https://apibase.pro/ai.txt","mcp":"https://apibase.pro/mcp","health":"https://apibase.pro/health/ready","tools":"https://apibase.pro/api/v1/tools"}';
        }

        # --- Health (no rate limit) ---
        location /health/ {
            proxy_pass http://api_backend;
        }

        # --- Custom Error Pages (§12.190) ---
        error_page 502 /502.json;
        error_page 503 /503.json;
        error_page 504 /504.json;

        location = /502.json {
            internal;
            default_type application/json;
            return 502 '{"error":"bad_gateway","message":"Backend unavailable"}';
        }

        location = /503.json {
            internal;
            default_type application/json;
            return 503 '{"error":"service_unavailable","message":"Service temporarily unavailable"}';
        }

        location = /504.json {
            internal;
            default_type application/json;
            return 504 '{"error":"gateway_timeout","message":"Backend timeout"}';
        }
    }
}
